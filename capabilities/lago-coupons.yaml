        method: GET
        description: Lago List all coupons
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: coupons-code
      path: /coupons/{code}
      operations:
      - name: updatecoupon
        method: PUT
        description: Lago Update a coupon
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: findcoupon
        method: GET
        description: Lago Retrieve a coupon
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: destroycoupon
        method: DELETE
        description: Lago Delete a coupon
        outputRawFormat: json
