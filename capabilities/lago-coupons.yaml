        method: POST
        description: Lago Apply a coupon to a customer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: findallappliedcoupons
        method: GET
        description: Lago List all applied coupons
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: The status of the coupon. Can be either `active` or `terminated`.
        - name: external_customer_id
          in: query
          type: string
          description: The customer external unique identifier (provided by your own application)
    - name: coupons
      path: /coupons
      operations:
      - name: createcoupon
        method: POST
        description: Lago Create a coupon
        outputRawFormat: json
        outputParameters:
        - name: result
