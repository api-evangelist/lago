        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: events-transaction_id
      path: /events/{transaction_id}
      operations:
      - name: findevent
        method: GET
        description: Lago Retrieve a specific event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.LAGO_API_KEY}}'
  exposes:
