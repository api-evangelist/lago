    resources:
    - name: events
      path: /events
      operations:
      - name: createevent
        method: POST
        description: Lago Send usage events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: findallevents
        method: GET
        description: Lago List all events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: code
          in: query
          type: string
          description: Filter events by its code.
        - name: timestamp_from
          in: query
          type: string
          description: Filter events by timestamp starting from a specific date.
        - name: timestamp_to
          in: query
          type: string
          description: Filter events by timestamp up to a specific date.
